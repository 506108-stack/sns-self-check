
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before Scroll</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌸 Before Scroll 🌸</h1>

<p class="subtitle">
SNSを見る前に、今の気持ちをチェックしてみよう
</p>

<div class="question">

<label>
<input type="checkbox" id="angry">
イライラしている
</label>

<label>
<input type="checkbox" id="sad">
落ち込んでいる
</label>

<label>
<input type="checkbox" id="tired">
疲れている
</label>

<label>
<input type="checkbox" id="compare">
他人と比べてしまいそう
</label>

</div>

<button onclick="diagnosis()">
診断する
</button>
<div class="camera-area">

  <video
    id="webcam"
    autoplay
    playsinline
    muted
    width="320"
    height="240">
  </video>

  <canvas
    id="output_canvas"
    width="320"
    height="240">
  </canvas>

  <p id="emotion">😊 表情を分析しています...</p>

</div>
<p id="result"></p>
</div>

<script src="diagnosis.js"></script>
<script type="module" src="face.js"></script>
<script src="app.js"></script>

</body>
</html>
